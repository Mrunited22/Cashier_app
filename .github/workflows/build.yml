name: Build APK

on:
  workflow_dispatch: # Ini yang memunculkan tombol 'Run workflow'
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Sesuaikan dengan versi Flutter kamu
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
